<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Pro - 한계를 뛰어넘다</title>
    <meta name="description" content="미래를 여는 성능, 최고급 프리미엄 노트북 NextGen Pro를 경험해보세요.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar fade-in">
        <div class="nav-container">
            <div class="nav-logo">NextGen <span>Pro</span></div>
            <ul class="nav-links">
                <li><a href="#" class="nav-link">홈페이지</a></li>
                <li><a href="#" class="nav-link">제품</a></li>
                <li><a href="#" class="nav-link">스토리</a></li>
                <li><a href="#" class="nav-link">문의</a></li>
                <li><a href="index_en.html" class="nav-link lang-toggle">EN</a></li>
            </ul>
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <main class="hero-section">
        <div class="background-container">
            <div class="bg-gradient"></div>
            <img src="laptop_bg.png" alt="Premium Laptop NextGen Pro" class="laptop-img" id="laptopImg">
        </div>

        <div class="content-wrapper">
            <header class="hero-header">
                <span class="badge fade-in-up">새로운 차원의 혁신</span>
                <h1 class="title fade-in-up delay-1">미래를 여는 <span>성능</span></h1>
                <p class="subtitle fade-in-up delay-2">초경량 디자인과 압도적인 파워의 완벽한 조화.<br>당신의 가능성을 무한대로 확장하세요.</p>
            </header>

            <div class="cta-container fade-in-up delay-3">
                <button class="btn btn-primary">사전예약 하기</button>
                <button class="btn btn-secondary">자세히 보기</button>
            </div>

            <div class="specs-container fade-in-up delay-4">
                <div class="spec-item glass">
                    <span class="spec-value">M4</span>
                    <span class="spec-label">차세대 칩셋</span>
                </div>
                <div class="spec-item glass">
                    <span class="spec-value">8K</span>
                    <span class="spec-label">OLED 디스플레이</span>
                </div>
                <div class="spec-item glass">
                    <span class="spec-value">14h</span>
                    <span class="spec-label">배터리 타임</span>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
